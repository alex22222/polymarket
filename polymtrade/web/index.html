<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Polymtrade Research</title>
    <link rel="stylesheet" href="/styles.css?v=7" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">BTC / ETH Barrier Research</p>
          <h1>Polymtrade</h1>
        </div>
        <div class="actions">
          <button id="refreshBtn" class="icon-btn" title="刷新数据" aria-label="刷新数据">↻</button>
          <button id="topScanBtn" class="primary-btn">运行 Scanner</button>
        </div>
      </header>

      <section class="metrics" aria-label="核心指标">
        <article>
          <span>候选</span>
          <strong id="scannerCandidates">--</strong>
        </article>
        <article>
          <span>最佳 Edge</span>
          <strong id="scannerBestEdge">--</strong>
        </article>
        <article>
          <span>最佳 ROI</span>
          <strong id="scannerBestRoi">--</strong>
        </article>
        <article>
          <span>扫描市场</span>
          <strong id="scannerScanned">--</strong>
        </article>
        <article>
          <span>价格源</span>
          <strong id="priceSource">--</strong>
        </article>
      </section>

      <section class="workspace">
        <div class="chart-panel">
          <div class="section-head">
            <h2>价格序列</h2>
            <div class="segmented" aria-label="资产切换">
              <button class="asset-toggle active" data-asset="BTC">BTC</button>
              <button class="asset-toggle" data-asset="ETH">ETH</button>
            </div>
          </div>
          <canvas id="priceChart" width="1100" height="420"></canvas>
        </div>

        <aside class="side-panel">
          <div class="section-head">
            <h2>策略栈</h2>
          </div>
          <div class="stack-list">
            <div><span>数据</span><strong id="stackData">等待 scanner</strong></div>
            <div><span>模型</span><strong id="stackModel">Monte Carlo Touch Probability</strong></div>
            <div><span>成本</span><strong id="stackCost">等待参数</strong></div>
            <div><span>执行</span><strong id="stackExecution">只读观察</strong></div>
          </div>
        </aside>
      </section>

      <section class="data-section">
        <div class="section-head">
          <h2>数据覆盖</h2>
          <div class="actions compact">
            <button id="fetchPricesBtn" class="secondary-btn">抓取真实价格</button>
            <button id="fetchMarketsBtn" class="secondary-btn">抓取真实市场</button>
          </div>
        </div>
        <div id="coverageRows" class="coverage-rows coverage-grid"></div>
      </section>

      <section class="scanner-section">
        <div class="section-head">
          <h2>Scanner</h2>
          <div class="actions compact">
            <span id="scannerMeta">尚未运行</span>
            <button id="scanBtn" class="secondary-btn">运行 Scanner</button>
          </div>
        </div>
        <div class="scanner-summary">
          <article>
            <span>波动率</span>
            <strong id="scannerVol">--</strong>
          </article>
          <article>
            <span>路径</span>
            <strong id="scannerPaths">--</strong>
          </article>
          <article>
            <span>过滤</span>
            <strong id="scannerSkipped">--</strong>
          </article>
          <article>
            <span>状态</span>
            <strong id="scannerStatus">--</strong>
          </article>
        </div>
        <div class="edge-panel">
          <div class="section-head">
            <h2>模型概率 vs 市场概率</h2>
            <span>对角线以上代表模型概率更高</span>
          </div>
          <canvas id="edgeChart" width="1100" height="360"></canvas>
        </div>
        <div class="table-wrap">
          <table class="scanner-table">
            <thead>
              <tr>
                <th>动作</th>
                <th>资产</th>
                <th>市场</th>
                <th>方向</th>
                <th>现价</th>
                <th>目标</th>
                <th>到期</th>
                <th>市场</th>
                <th>模型</th>
                <th>净 Edge</th>
                <th>ROI</th>
                <th>流动性</th>
              </tr>
            </thead>
            <tbody id="scannerRows"></tbody>
          </table>
        </div>
      </section>

      <p id="statusText" class="status-line">读取本地数据库</p>
    </main>
    <script src="/app.js?v=10"></script>
  </body>
</html>
